name: Publish to MCP Registry

# Remote server (no package to build): just publish server.json to the official
# MCP registry. Auth is GitHub OIDC — the workflow runs in the cryptomfer repo,
# which authorizes the `io.github.cryptomfer/*` namespace. No secrets needed.

on:
  push:
    tags: ["v*"] # e.g. v2.0.0
  workflow_dispatch: {} # allow manual runs

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
